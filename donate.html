<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>寄付ページ</title>

<style>
body {
  font-family: sans-serif;
  text-align: center;
}


button {
  min-width: 150px;
  height: 60px;
  font-size: 24px;
  padding: 0 20px;
  border-radius: 30px;
  cursor: pointer;
}


button:hover {
  transform: scale(1.05);
}

.pay {
  background-color: gold
}

.poster {
  display: block;
  margin: 20px auto;
}
</style>
</head>


<body>
 

<h1>寄付ページ</h1>

<p>あなたの寄付を受け付けます</p>

<h2 id="amount"></h2>


<script>
const params = new URLSearchParams(window.location.search);
const amount = params.get("amount");

document.getElementById("amount").textContent =
  "寄付金額: " + amount + "円";

</script>

<button class="back" onclick="location.href='index.html'">
  最初のページへ戻る
</button>

<a href="https://ofuse.me/donateme">
  <button class="pay">
    お支払いはこちらから
  </button>
</a>

<img src="ofuse_poster_1.png" width="200" class="poster">

</body>
</html>
